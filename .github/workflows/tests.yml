name: 'Test Report'

on:
  workflow_run:
    workflows: ['CI'] 
    types:
      - completed

jobs:
  report:
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write
      contents: read
    steps:
    - uses: dorny/test-reporter@v3.0.0
      with:
        artifact: test-results              
        name: JEST Tests                    
        path: 'test.results.xml'            
        reporter: jest-junit  
