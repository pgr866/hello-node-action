name: 'Test Report'

on:
  workflow_run:
    workflows: ['CI'] 
    types:
      - completed
jobs:
  report:
    runs-on: ubuntu-latest 
    steps:
    - uses: dorny/test-reporter@v2.6.0
      with:
        artifact: test-results              
        name: JEST Tests                    
        path: 'test.results.xml'            
        reporter: jest-junit
